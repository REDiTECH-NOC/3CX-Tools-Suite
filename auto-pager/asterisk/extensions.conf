; Dialplan for Auto-Pager
; Paging uses AMI Originate with Application=Playback (no dialplan needed).
; Reject any unexpected incoming calls from 3CX.

[default]
exten => _X.,1,NoOp(Unexpected call to ${EXTEN})
 same => n,Hangup()

[from-3cx]
; Reject incoming calls — we only make outbound calls via AMI Originate.
exten => _X.,1,NoOp(Rejecting unexpected incoming call to ${EXTEN})
 same => n,Congestion()
 same => n,Hangup()
